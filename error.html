<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Kết nối bị chặn – VN Proxy Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827; color: #d1d5db;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1f2937; border: 1px solid #374151;
      border-radius: 16px; padding: 40px 48px;
      max-width: 520px; width: 90%; text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #f9fafb; margin-bottom: 10px; }
    .reason-badge {
      display: inline-block; padding: 6px 16px; border-radius: 20px;
      font-size: 14px; font-weight: 600; margin-bottom: 20px;
    }
    .reason-expiring { background: #5e3a0b; color: #fb923c; }
    .reason-expired  { background: #5e0b0b; color: #f87171; }
    .reason-renewing { background: #1e3a5f; color: #60a5fa; }
    .reason-no_proxy { background: #374151; color: #9ca3af; }
    .reason-error    { background: #5e3a0b; color: #fb923c; }

    .desc { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 8px; }
    .site-url {
      font-size: 12px; font-family: monospace;
      background: #111827; border: 1px solid #374151;
      border-radius: 6px; padding: 6px 12px;
      color: #6b7280; margin: 16px 0 24px;
      word-break: break-all;
    }
    .group-name { color: #e94560; font-weight: 600; }

    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button {
      padding: 10px 22px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-back     { background: #374151; color: #d1d5db; }
    .btn-settings { background: #e94560; color: #fff; }
    .btn-retry    { background: #065f46; color: #6ee7b7; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #60a5fa44; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .renewing-note {
      font-size: 12px; color: #6b7280; margin-top: 16px; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">🔒</div>
    <h1>Kết nối bị chặn</h1>
    <div class="reason-badge" id="reasonBadge"></div>
    <p class="desc" id="desc"></p>
    <div class="site-url" id="siteUrl"></div>
    <div class="renewing-note" id="renewingNote" style="display:none">
      <span class="spinner"></span>Đang gia hạn proxy tự động…<br>
      Vui lòng thử lại sau <span id="countdown">60</span> giây.
    </div>
    <div class="actions">
      <button class="btn-back" id="btnBack">← Quay lại</button>
      <button class="btn-retry" id="btnRetry">↺ Thử lại</button>
      <button class="btn-settings" id="btnSettings">⚙ Cài đặt</button>
    </div>
  </div>

  <script src="polyfill.js"></script>
  <script src="error.js"></script>
</body>
</html>
